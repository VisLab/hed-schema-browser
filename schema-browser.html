<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>HED Schema Browser</title>
      
      <!-- Third-party libraries are vendored locally under vendor/ so the app has
           no external CDN dependencies. This avoids the whole page breaking when a
           CDN is unreachable or its cached file is corrupted (ERR_CACHE_READ_FAILURE
           on the jQuery CDN previously left jQuery undefined and killed the app).
           Versions: Bootstrap 4.4.1, jQuery 3.3.1, jQuery UI 1.12.1, Popper 1.16.0. -->
      <link rel="stylesheet" href="vendor/bootstrap-4.4.1.min.css">
      <link rel="stylesheet" type="text/css" href="source/hed-collapsible.css">
      <link rel="stylesheet" href="vendor/jquery-ui-1.12.1.css">
      <script src="vendor/jquery-3.3.1.min.js"></script>
      <script src="vendor/jquery-ui-1.12.1.min.js"></script>
      <script src="source/schema-browser.js"></script>
      <style>
        .autocomplete {
            /*the container must be positioned relative:*/
            position: relative;
            display: inline-block;
        }
        .autocomplete-items {
            position: absolute;
            border: 1px solid #d4d4d4;
            border-bottom: none;
            border-top: none;
            z-index: 99;
            /*position the autocomplete items to be the same width as the container:*/
            top: 100%;
            left: 0;
            right: 0;
        }
        .autocomplete-items div {
            padding: 10px;
            cursor: pointer;
            background-color: #fff;
            border-bottom: 1px solid #d4d4d4;
        }
        .autocomplete-items div:hover {
            /*when hovering an item:*/
            background-color: #e9e9e9;
        }
        .autocomplete-active {
            /*when navigating through the items using the arrow keys:*/
            background-color: DodgerBlue !important;
            color: #ffffff;
        }
      </style>
   </head>
   <body>
      <div class="container-fluid">
         <div class="row mt-3">
            <div class="col">
               <div class="d-flex flex-wrap align-items-center pt-2 px-3 rounded" style="background-color: #2c3e50;" role="toolbar" aria-label="Schema controls">

                  <!-- Cluster: schema + version selection -->
                  <div class="d-flex flex-nowrap align-items-center mr-4 mb-2">
                     <div class="dropdown mr-2">
                        <button class="btn btn-light btn-sm dropdown-toggle" type="button" id="dropdownSchemaButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" >
                        Schema
                        </button>
                        <div class="dropdown-menu" id="schemaDropdown" aria-labelledby="dropdownSchemaButton"></div>
                     </div>
                     <div class="dropdown">
                        <button class="btn btn-light btn-sm dropdown-toggle" type="button" id="dropdownSchemaVersionButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" >
                        Schema version
                        </button>
                        <div class="dropdown-menu" id="schemaVersionDropdown" aria-labelledby="dropdownSchemaVersionButton"></div>
                     </div>
                  </div>

                  <!-- Cluster: display toggles -->
                  <div class="d-flex flex-nowrap align-items-center mr-4 mb-2">
                     <button class="btn btn-light btn-sm mr-2" type="button" id="toggleInLibrary" onclick="showHideMergedLibrary()">
                        Show library only
                     </button>
                     <button class="btn btn-light btn-sm mr-2" type="button" id="prereleaseToggle" onclick="handlePrereleaseToggle()">
                        <span id="prereleaseText">Show prerelease</span>
                     </button>
                     <button class="btn btn-light btn-sm" type="button" id="deprecatedToggle" onclick="handleDeprecatedToggle()">
                        <span id="deprecatedText">Show deprecated</span>
                     </button>
                  </div>

               </div>
            </div>
         </div>
         <div class="row" style="margin-top: 2.25rem;">
            <div class="col col-lg-12">
               <div class="d-flex flex-wrap align-items-center mb-2">
                  <h1 id="hed" class="hed-header mb-0">HED Schema</h1>
                  <!-- Expand controls, aligned to the right end of the schema-title line -->
                  <div class="d-flex flex-nowrap align-items-center ml-auto">
                     <button type="button" class="btn btn-light btn-sm mr-2" id="expandCollapseBtn"
                             data-state="collapsed" onclick="toggleExpandCollapse()">Expand all</button>
                     <div class="input-group input-group-sm" style="width: auto;">
                        <div class="input-group-prepend">
                           <span class="input-group-text" id="toLevelLabel">Expand to level</span>
                        </div>
                        <input type="text" class="form-control text-center" id="toLevel" style="width: 3em;" maxlength="3"
                               inputmode="numeric" pattern="[0-9]*" value="1"
                               oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                               onchange="expandLevelInputChanged(this.value)"
                               onkeydown="if (event.key === 'Enter') { this.blur(); }"
                               aria-describedby="toLevelLabel" title="Enter the depth level to expand to (max 1)">
                     </div>
                  </div>
               </div>
               <div class="accordion" id="accordionExample">
                  <div class="card">
                     <div class="card-header d-flex align-items-center flex-wrap py-2" id="headingOne">
                        <h5 class="mb-0">
                           <button class="btn btn-link btn-sm collapse-toggle collapsed" type="button" data-toggle="collapse" data-target="#schemaDesc" aria-expanded="false" aria-controls="schemaDesc">
                              Schema information
                           </button>
                        </h5>
                        <div class="input-group input-group-sm ml-auto mr-2" style="width: auto;">
                           <div class="input-group-prepend">
                              <span class="input-group-text" id="searchTagLabel">Search term</span>
                           </div>
                           <div class="ui-widget" style="position: relative;">
                              <input type="text" class="form-control form-control-sm" id="searchTags" aria-describedby="searchTagLabel" title="Search for HED tags">
                           </div>
                        </div>
                        <div class="form-check form-check-inline mr-0">
                           <input class="form-check-input" type="checkbox" id="searchDeprecatedTags" onchange="getSchemaNodes()">
                           <label class="form-check-label" for="searchDeprecatedTags" style="font-size: 0.875rem;">Search deprecated tags</label>
                        </div>
                     </div>
                     <div id="schemaDesc" class="collapse" aria-labelledby="headingOne" data-parent="#accordionExample">
                        <div class="card-body">
                           <p class="text-justify fw-light" id="prologue"></p>
                           <p class="text-justify fw-light" id="epilogue"></p>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
         <div class="row mt-3">
            <div class="col-12">
               <!-- Resizable split: schema tree (left) + pinned detail panel (right).
                    Hover/focus a tag to preview it; click the name to pin. -->
               <div class="tree-split" id="treeSplit">
                  <div class="pane-tree">
                     <div id="schema" class="list-group list-group-root well"></div>
                  </div>
                  <div class="tree-divider" id="treeDivider" role="separator" aria-orientation="vertical" title="Drag to resize"></div>
                  <div class="pane-info">
                     <div class="tag-panel-header">
                        <span class="tp-title">Tag details</span>
                        <span class="tp-hint">Click tag to pin</span>
                        <button type="button" id="clearAllTags" class="btn btn-outline-secondary btn-sm ml-auto" disabled>Clear all</button>
                     </div>
                     <!-- transient hover preview -->
                     <div id="tagPreview" aria-live="polite"></div>
                     <!-- accumulated pinned tag sections (one per clicked tag) -->
                     <div id="tagPinnedList"></div>
                  </div>
               </div>
               <div class="v-resize" id="treeResize" role="separator" aria-orientation="horizontal" title="Drag to resize the tree area height"></div>
            </div>
         </div>
         <!-- Schema extra sections: full-width collapsible below the tree and info board -->
         <div class="row mt-3 mb-5">
            <div class="col-12">
               <div id="schemaDefinitions" class="accordion accordion-hidden">
                  <div class="card">
                     <div class="card-header py-2 d-flex align-items-center" id="headingExtra">
                        <button class="btn btn-link btn-sm collapse-toggle collapsed" type="button" data-toggle="collapse" data-target="#extraSectionsBody" aria-expanded="false" aria-controls="extraSectionsBody">
                           Schema extra sections
                        </button>
                        <button type="button" id="toggleExtraDesc" class="btn btn-outline-secondary btn-sm ml-auto mr-2">Show descriptions</button>
                        <button type="button" id="toggleExtraAttrs" class="btn btn-outline-secondary btn-sm">Show attributes</button>
                     </div>
                     <div id="extraSectionsBody" class="collapse" aria-labelledby="headingExtra">
                        <div class="card-body extra-scroll" id="extraScroll">
                           <button class="btn btn-link btn-sm collapse-toggle collapsed d-block text-left" type="button" data-toggle="collapse" data-target="#unitClassDefinitions" aria-expanded="false" aria-controls="unitClassDefinitions">Unit classes</button>
                           <div id="unitClassDefinitions" class="list-group collapse multi-collapse"></div>

                           <button class="btn btn-link btn-sm collapse-toggle collapsed d-block text-left" type="button" data-toggle="collapse" data-target="#unitModifierDefinitions" aria-expanded="false" aria-controls="unitModifierDefinitions">Unit modifiers</button>
                           <div id="unitModifierDefinitions" class="list-group collapse multi-collapse"></div>

                           <button class="btn btn-link btn-sm collapse-toggle collapsed d-block text-left" type="button" data-toggle="collapse" data-target="#valueClassDefinitions" aria-expanded="false" aria-controls="valueClassDefinitions">Value classes</button>
                           <div id="valueClassDefinitions" class="list-group collapse multi-collapse"></div>

                           <button class="btn btn-link btn-sm collapse-toggle collapsed d-block text-left" type="button" data-toggle="collapse" data-target="#schemaAttributeDefinitions" aria-expanded="false" aria-controls="schemaAttributeDefinitions">Schema attributes</button>
                           <div id="schemaAttributeDefinitions" class="list-group collapse multi-collapse"></div>

                           <button class="btn btn-link btn-sm collapse-toggle collapsed d-block text-left" type="button" data-toggle="collapse" data-target="#propertyDefinitions" aria-expanded="false" aria-controls="propertyDefinitions">Schema properties</button>
                           <div id="propertyDefinitions" class="list-group collapse multi-collapse"></div>

                           <button class="btn btn-link btn-sm collapse-toggle collapsed d-block text-left" type="button" data-toggle="collapse" data-target="#schemaSources" aria-expanded="false" aria-controls="schemaSources">Sources</button>
                           <div id="schemaSources" class="list-group collapse multi-collapse"></div>

                           <button class="btn btn-link btn-sm collapse-toggle collapsed d-block text-left" type="button" data-toggle="collapse" data-target="#schemaPrefixes" aria-expanded="false" aria-controls="schemaPrefixes">Prefixes</button>
                           <div id="schemaPrefixes" class="list-group collapse multi-collapse"></div>

                           <button class="btn btn-link btn-sm collapse-toggle collapsed d-block text-left" type="button" data-toggle="collapse" data-target="#externalAnnotations" aria-expanded="false" aria-controls="externalAnnotations">External annotations</button>
                           <div id="externalAnnotations" class="list-group collapse multi-collapse"></div>
                        </div>
                        <div class="v-resize" id="extraResize" role="separator" aria-orientation="horizontal" title="Drag to resize the extra sections height"></div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <!-- Back to top button -->
      <button
         type="button"
         class="btn btn-primary btn-floating btn-lg"
         id="btn-back-to-top"
         >Scroll to top
      <span aria-hidden="true">&#8593;</span>
      </button>
      <script src="vendor/popper-1.16.0.min.js"></script>
      <script src="vendor/bootstrap-4.4.1.min.js"></script>
      <script>
         // load() reads ?schema=, ?version=, and ?prerelease=true from the URL itself
         // and updates the prerelease toggle button state after each schema loads.
         // .catch surfaces any startup failure in the console instead of as an
         // unhandled promise rejection.
         load("standard").catch(function (err) {
             console.error('Schema browser failed to initialize:', err);
         });
      </script>
   </body>
</html>
