name: Test Schema Browser

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main]

# Minimal token permissions: both jobs only read the repo contents.
permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      
      - name: Link Checker
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: --verbose --no-progress --exclude 'https://github.com/hed-standard/hed-schema-browser/workflows/Deploy/badge.svg' --exclude 'http://localhost*' '**/*.html' '**/*.md'
          fail: true
          
  html-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      
      - name: HTML5 Validator
        uses: Cyb3r-Jak3/html5validator-action@4ea5e57383ed7e14432ebbaae1b64893b7c5210b # v8.0.0
        with:
          root: .